<!DOCTYPE html>
<html>
<head>
    <title>Ejaz Webpage</title>

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        h1 {
            color: #007bff;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            color: #333;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>

</head>

<body>

    <div class="box">
        <h1>Hello!</h1>
        <p>My name is Ejaz</p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>


    <script>
        function showMessage() {
            alert("Welcome to Ejaz's Webpage!");
        }
    </script>

</body>
</html>
